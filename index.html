<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Job Test</title>
  <meta
    name="description"
    content="Take the 30-second AI Job Test and see how vulnerable your career is to AI."
  />
  <meta name="theme-color" content="#0f172a" />
  <link rel="canonical" href="https://soruva.github.io/ai-job-test/" />

  <meta property="og:title" content="AI Job Test" />
  <meta
    property="og:description"
    content="Find out how vulnerable your job is to AI in 30 seconds."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://soruva.github.io/ai-job-test/" />
  <meta property="og:image" content="https://soruva.github.io/ai-job-test/og-image.png" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZFVXTT26DX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-ZFVXTT26DX");
  </script>

  <style>
    :root{
      --bg:#0f172a;
      --bg2:#111827;
      --panel:rgba(30,41,59,.92);
      --panel-dark:#0b1220;
      --line:rgba(255,255,255,.12);

      --cyan:#06b6d4;
      --cyan2:#67e8f9;
      --blue:#3b82f6;
      --violet:#8b5cf6;
      --pink:#ec4899;

      --salmon:#ff8a80;
      --salmon2:#ffb199;
      --green:#22c55e;
      --yellow:#fde047;
      --orange:#fb923c;
      --red:#f87171;

      --safe1:#bfdbfe;
      --safe2:#dbeafe;
      --risk1:#fecaca;
      --risk2:#fee2e2;
      --leader1:#c4b5fd;
      --leader2:#ddd6fe;
      --faq:#cbd5e1;

      --text:#ffffff;
      --text-dark:#0f172a;
      --muted:#94a3b8;
      --muted-dark:#334155;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 24%),
        radial-gradient(circle at top right, rgba(236,72,153,.12), transparent 22%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      padding:24px;
      text-align:center;
    }

    .container{
      max-width:1120px;
      margin:0 auto;
      background:var(--panel);
      border-radius:28px;
      padding:30px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .hero{
      background:linear-gradient(135deg,#06b6d4 0%, #3b82f6 35%, #8b5cf6 70%, #ec4899 100%);
      border-radius:24px;
      padding:42px 24px;
      margin-bottom:28px;
      box-shadow:0 16px 36px rgba(59,130,246,.25);
    }

    .hero-badge{
      display:inline-block;
      padding:8px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.2);
      border:1px solid rgba(255,255,255,.22);
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
      letter-spacing:.03em;
    }

    h1{
      font-size:48px;
      margin:0 0 10px;
      line-height:1.05;
    }

    .hero p{
      font-size:18px;
      max-width:760px;
      margin:0 auto;
      line-height:1.6;
    }

    .live-stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-top:22px;
    }

    .stat-card{
      background:rgba(255,255,255,.18);
      border-radius:16px;
      padding:14px;
      font-weight:700;
      font-size:14px;
      backdrop-filter:blur(6px);
    }

    .nav-links{
      margin:28px 0 8px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .nav-links a{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.15);
      color:white;
      text-decoration:none;
      font-weight:700;
      font-size:14px;
    }

    .nav-links a:hover{
      background:rgba(255,255,255,.2);
    }

    .quiz-shell{
      margin-top:8px;
      min-height:260px;
    }

    .input,
    .job-input,
    .email-input{
      padding:14px;
      border-radius:12px;
      border:none;
      width:80%;
      max-width:440px;
      font-size:16px;
    }

    .email-input{
      background:#ffffff;
      color:#111;
      border:2px solid #3b82f6;
      box-shadow:0 0 0 2px rgba(59,130,246,.2);
    }

    .email-input:focus,
    .job-input:focus{
      outline:none;
      box-shadow:0 0 0 3px rgba(6,182,212,.25);
    }

    button{
      cursor:pointer;
      border:none;
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--cyan),var(--cyan2));
      padding:14px 22px;
      border-radius:14px;
      font-weight:700;
      color:black;
      font-size:16px;
      margin:6px;
    }

    .btn-secondary{
      background:white;
      color:black;
      padding:12px 20px;
      border-radius:12px;
      font-weight:700;
      font-size:15px;
      margin:6px;
    }

    .btn-x,
    .btn-reddit,
    .btn-copy{
      padding:12px 18px;
      border-radius:12px;
      font-weight:700;
      font-size:15px;
      margin:6px;
    }

    .btn-x{
      background:black;
      color:white;
    }

    .btn-reddit{
      background:#ff4500;
      color:white;
    }

    .btn-copy{
      background:var(--green);
      color:black;
    }

    .answer{
      display:block;
      width:100%;
      max-width:580px;
      margin:10px auto;
      padding:14px;
      border-radius:14px;
      background:#334155;
      color:white;
      font-size:16px;
      transition:all .15s ease;
    }

    .answer:hover{
      background:#475569;
      transform:translateY(-2px);
    }

    .selected{
      background:linear-gradient(135deg,var(--salmon),var(--salmon2)) !important;
      color:#111 !important;
      transform:scale(1.06);
      box-shadow:
        0 0 0 4px rgba(255,138,128,0.25),
        0 10px 25px rgba(0,0,0,0.35);
    }

    .progress-wrap{
      max-width:620px;
      margin:0 auto 18px;
      text-align:left;
    }

    .progress-label{
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:8px;
      font-weight:700;
    }

    .progress-bar{
      width:100%;
      height:14px;
      background:#1e293b;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
      width:0%;
      transition:width .25s ease;
    }

    .alert-bar{
      background:#7c2d12;
      padding:10px;
      border-radius:10px;
      font-weight:700;
      margin-bottom:12px;
    }

    .result-card{
      background:var(--panel-dark);
      border-radius:20px;
      padding:26px;
      margin-top:20px;
      border:2px solid var(--cyan);
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }

    .result-label{
      color:#cbd5e1;
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .result-score{
      font-size:72px;
      font-weight:700;
      background:linear-gradient(135deg,#67e8f9,#3b82f6,#8b5cf6);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      line-height:1;
      margin-top:8px;
    }

    .result-status{
      font-size:30px;
      font-weight:700;
      margin-top:10px;
    }

    .percentile{
      color:var(--yellow);
      font-weight:700;
      margin-top:12px;
      font-size:18px;
    }

    .scarcity{
      margin-top:14px;
      font-weight:700;
      color:#fca5a5;
    }

    .supporting-line{
      color:#93c5fd;
      font-weight:700;
      margin-top:14px;
    }

    .share-row{
      margin-top:16px;
    }

    .share-stats{
      margin-top:16px;
      font-weight:700;
      color:#fef08a;
    }

    .share-url{
      display:none;
    }

    .section{
      margin-top:42px;
      padding:26px;
      border-radius:22px;
      text-align:left;
      color:var(--text-dark);
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .section h3{
      margin-top:0;
      margin-bottom:8px;
    }

    .safe-section{
      background:linear-gradient(135deg,var(--safe1),var(--safe2));
    }

    .risk-section{
      background:linear-gradient(135deg,var(--risk1),var(--risk2));
    }

    .leader-section{
      background:linear-gradient(135deg,var(--leader1),var(--leader2));
    }

    .faq-section{
      background:var(--faq);
    }

    .dark-info-section{
      background:linear-gradient(135deg,#1e3a8a,#312e81);
      color:white;
    }

    .dark-info-section h3{
      color:white;
    }

    .dark-info-section p,
    .dark-info-section li{
      color:#e2e8f0;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:12px;
      margin-top:16px;
    }

    .job-card{
      background:rgba(255,255,255,0.12);
      color:white;
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(6px);
      padding:14px;
      border-radius:14px;
      text-align:center;
      font-weight:700;
      box-shadow:0 4px 12px rgba(0,0,0,.06);
    }

    .leaderboard-list{
      display:grid;
      gap:10px;
      margin-top:16px;
    }

    .leaderboard-item{
      background:white;
      border-radius:14px;
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:700;
      box-shadow:0 4px 12px rgba(0,0,0,.06);
    }

    details{
      background:white;
      border-radius:14px;
      padding:16px;
      border:2px solid #cbd5e1;
      margin-bottom:12px;
    }

    summary{
      font-weight:700;
      cursor:pointer;
      list-style:none;
    }

    summary::-webkit-details-marker{
      display:none;
    }

    .faq-answer{
      margin-top:10px;
      color:#334155;
      line-height:1.6;
    }

    ul{
      margin:10px 0 0 20px;
      padding:0;
      line-height:1.7;
    }

    .reason-box,
    .preview-box{
      background:#0f172a;
      padding:20px;
      border-radius:14px;
      margin-top:14px;
      text-align:left;
    }

    .small-note{
      font-size:14px;
      color:#94a3b8;
    }

    .cta-title{
      font-size:18px;
      font-weight:700;
      margin-top:6px;
      margin-bottom:0;
    }

    .mono-url{
      font-family:Arial, Helvetica, sans-serif;
      word-break:break-all;
    }

    footer{
      margin-top:40px;
      font-size:14px;
      color:#cbd5e1;
    }

    footer a{
      color:#cbd5e1;
      text-decoration:none;
      margin:0 8px;
    }

    footer a:hover{
      color:white;
    }

    @media (max-width:760px){
      body{padding:14px}
      .container{padding:18px}
      h1{font-size:36px}
      .hero{padding:30px 16px}
      .live-stats{grid-template-columns:1fr}
      .answer{width:100%}
      .job-input,.email-input{width:100%}
      .cards{grid-template-columns:repeat(2,1fr)}
      .result-score{font-size:58px}
      .result-status{font-size:24px}
      .leaderboard-item{font-size:14px}
    }
  </style>
</head>
