<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:20px;
}

h1{
font-size:36px;
}

button{
padding:15px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.start{
background:#06b6d4;
color:black;
font-weight:bold;
}

.answer{
background:#334155;
color:white;
width:80%;
}

.answer:hover{
background:#475569;
}

.selected{
background:#ff8a80 !important;
color:black !important;
transform:scale(1.05);
}

.share{
background:#22c55e;
color:black;
}

.email{
padding:12px;
width:70%;
border-radius:8px;
border:none;
margin-top:10px;
}

.resultCard{
background:#020617;
border-radius:16px;
padding:30px;
margin-top:20px;
border:2px solid #06b6d4;
}

.resultScore{
font-size:60px;
font-weight:bold;
color:#06b6d4;
margin:20px 0;
}

.resultLabel{
font-size:18px;
color:#94a3b8;
}

.resultStatus{
font-size:24px;
}

footer{
margin-top:40px;
font-size:14px;
}

footer a{
color:#94a3b8;
text-decoration:none;
margin:0 10px;
}

footer a:hover{
color:white;
}

</style>

<body>

<div class="container">

<h1>AI Job Test</h1>

<p>Will AI replace your job? Take the 30-second test.</p>

<div id="game"></div>

</div>

<script>

const questions=[
"Does your job require human empathy?",
"Do you solve unexpected problems often?",
"Do you interact with people face-to-face?",
"Does your work involve creativity?",
"Do you make complex decisions?",
"Does your job depend on trust or relationships?",
"Is your work mostly repetitive?",
"Could software automate most of your tasks?",
"Do you regularly learn new skills?",
"Do you work in unpredictable environments?"
]

let job=""
let index=0
let score=0
let aiScore=0
let result=""

function showStart(){

document.getElementById("game").innerHTML=`

<h2>What is your job?</h2>

<input id="job" class="email" placeholder="Example: Accountant">

<br><br>

<button class="start" onclick="start()">
Start Test
</button>

`

}

function start(){

job=document.getElementById("job").value

if(job==""){
alert("Enter your job first")
return
}

index=0
score=0

showQuestion()

}

function showQuestion(){

if(index>=questions.length){

showResult()
return

}

document.getElementById("game").innerHTML=`

<p>Question ${index+1} / ${questions.length}</p>

<h2>${questions[index]}</h2>

<button class="answer" onclick="answer(this,2)">Yes</button>
<br>
<button class="answer" onclick="answer(this,1)">Sometimes</button>
<br>
<button class="answer" onclick="answer(this,0)">No</button>

`

}

function answer(button,value){

button.classList.add("selected")

if(index==6||index==7){
value=2-value
}

score+=value

setTimeout(()=>{

index++
showQuestion()

},250)

}

function showResult(){

if(score>=16){
result="Very Hard to Replace"
}
else if(score>=11){
result="Moderately Safe"
}
else if(score>=6){
result="At Risk"
}
else{
result="High AI Risk"
}

aiScore=Math.round((score/20)*100)

document.getElementById("game").innerHTML=`

<h2>AI Risk Result for ${job}</h2>

<div class="resultCard">

<div class="resultLabel">
My AI Risk Score
</div>

<div class="resultScore">
${aiScore}%
</div>

<div class="resultStatus">
${result}
</div>

</div>

<br>

<button class="share" onclick="shareX()">Share on X</button>

<button class="share" onclick="shareReddit()">Share on Reddit</button>

<button class="share" onclick="copyResult()">Copy Result</button>

<br><br>

<h3>Get full AI-proof career report</h3>

<input id="email" class="email" placeholder="Enter your email">

<br>

<button class="start" onclick="generateReport()">
Unlock Full Report
</button>

<br><br>

<button class="start" onclick="showStart()">
Try Again
</button>

`

}

function shareX(){

const text=`I tested my job against AI.

My AI risk score was ${aiScore}%.

Try it yourself:`

const url=window.location.href

const shareUrl=`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`

window.location.href=shareUrl

}

function shareReddit(){

const url=window.location.href

const title=`I tested my job against AI – my score was ${aiScore}%`

window.location.href=`https://www.reddit.com/submit?url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`

}

function copyResult(){

const text=`I tested my job against AI.

My AI risk score was ${aiScore}%.

Try it yourself:
${window.location.href}`

navigator.clipboard.writeText(text)

alert("Result copied!")

}

function generateReport(){

const email=document.getElementById("email").value

if(email==""){
alert("Enter your email to unlock the report")
return
}

document.getElementById("game").innerHTML=`

<h2>Your AI Career Report</h2>

<p>Your AI risk score: <b>${aiScore}%</b></p>

<p>${job} has a risk level of <b>${result}</b>.</p>

<h3>Recommended AI-proof skills</h3>

<ul>
<li>Creative problem solving</li>
<li>Human communication</li>
<li>AI collaboration</li>
<li>Strategic thinking</li>
</ul>

<p>We sent a deeper report to your email.</p>

<button class="start" onclick="showStart()">Restart Test</button>

`

}

showStart()

</script>
